# Top-level Wrangler config.
#
# Why this lives at the root: Cloudflare Workers Builds auto-detects project
# type from root-level files. With this `wrangler.toml` present at the repo
# root, Cloudflare correctly identifies this as a Workers project and runs
# `wrangler deploy` — even if the project's "Root directory" setting is
# left at default. That prevents Cloudflare from misclassifying us as a
# Python project (which it does if it only sees requirements-desktop.txt).
#
# A second `wrangler.toml` lives under `worker/` for local development
# (`cd worker && npx wrangler dev`). Both reference the same source file.
# Keep them in sync.

name = "heybuddy-proxy"
main = "worker/src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ELEVENLABS_VOICE_ID = "kPzsL2i3teMYv0FxEYQ6"
